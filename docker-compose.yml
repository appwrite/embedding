services:
  embedding:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EMBEDDING_MODELS: ${EMBEDDING_MODELS:-nomic,bge-small}
    image: embedding:latest
    container_name: embedding
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - models:/home/embedder/models
    restart: unless-stopped

volumes:
  models:
